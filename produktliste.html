<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produktliste</title>
    <link rel="stylesheet" href="general.css" />
  </head>

  <body>
    <h1>Produkter</h1>

    <div class="product_list_container">
      <a href="product.html" class="product_card">
        <div class="image_container">
          <img src="img/Skærmbillede 2026-02-23 kl. 15.14.50.png" alt="Produkt" />
        </div>
        <h3>Running Jacket</h3>
        <p class="brand">Nike</p>
        <p class="price">799 kr.</p>
      </a>

      <!-- PRODUCT 2 (RABAT) -->
      <a href="product.html" class="product_card on_sale">
        <div class="image_container">
          <span class="sale_badge">-30%</span>
          <img src="img/Skærmbillede 2026-02-23 kl. 15.15.04.png" alt="Produkt" />
        </div>
        <h3>Training Shoes</h3>
        <p class="brand">Adidas</p>
        <div class="price_container">
          <p class="old_price">999 kr.</p>
          <p class="price sale_price">699 kr.</p>
        </div>
      </a>

      <a href="product.html" class="product_card sold_out">
        <div class="image_container">
          <span class="sold_out_badge">Udsolgt</span>
          <img src="img/Skærmbillede 2026-02-23 kl. 15.15.23.png" alt="Produkt" />
        </div>
        <h3>Sports Cap</h3>
        <p class="brand">Puma</p>
        <p class="price">299 kr.</p>
      </a>

      <a href="product.html" class="product_card">
        <div class="image_container">
          <img src="img/Skærmbillede 2026-02-23 kl. 15.15.51.png" alt="Produkt" />
        </div>
        <h3>Fitness Tights</h3>
        <p class="brand">Reebok</p>
        <p class="sale_badge">50%</p>
      </a>
    </div>
  </body>
</html>
