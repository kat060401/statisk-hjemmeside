<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produktliste</title>
    <link rel="stylesheet" href="general.css" />
  </head>

  <body>
    <h1>PRODUKTER</h1>

    <div class="product_list_container">
      <a href="produkt.html" class="product_card">
        <div class="image_container">
          <img src="img/1.jpg" alt="Produkt" />
        </div>
        <h3>Seje bukser</h3>
        <p class="brand">Designbysi</p>
        <p class="price">799 kr.</p>
      </a>

      <a href="produkt.html" class="product_card on_sale">
        <div class="image_container">
          <span class="sale_badge">-30%</span>
          <img src="img/2.jpg" alt="Produkt" />
        </div>
        <h3>Lilla prikket top</h3>
        <p class="brand">Designbysi</p>
        <div class="price_container">
          <p class="old_price">999 kr.</p>
          <p class="price sale_price">699 kr.</p>
        </div>
      </a>

      <a href="produkt.html" class="product_card sold_out">
        <div class="image_container">
          <span class="sold_out_badge">Udsolgt</span>
          <img src="img/3.jpg" alt="Produkt" />
        </div>
        <h3>Prikket top</h3>
        <p class="brand">Designbysi</p>
        <p class="price">299 kr.</p>
      </a>

      <a href="produkt.html" class="product_card begge">
        <div class="image_container">
          <img src="img/4.jpg" alt="Produkt" />
        </div>
        <h3>Hvid prikket top</h3>
        <p class="brand">Designbysi</p>
        <p class="sale_badge">50%</p>
        <p class="sold_out_badge2">Udsolgt</p>
        <div class="price_container">
          <p class="old_price">999 kr.</p>
          <p class="price sale_price">699 kr.</p>
        </div>
      </a>
    </div>
  </body>
</html>
