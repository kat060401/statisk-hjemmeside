<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produkt</title>
    <link rel="stylesheet" href="general.css" />
  </head>
  <body>
    <h1 class="h1">KØB PRODUKTET</h1>
    <section class="fuld">
      <h2 class="h2">Produkt detaljer:</h2>
      <div class="delet">
        <img class="billede" src="img/1.jpg" alt="" />

        <div>
          <dl>
            <dt>Model name</dt>
            <dd>Takina cargubukser</dd>

            <dt>Color</dt>
            <dd>brun</dd>

            <dt>Materiale</dt>
            <dd>100% bomuld</dd>
          </dl>
          <div class="tekst">
            <p><span> ⌂ </span>Fri fragt v/køb over 600 kr.(pakkeshop)</p>
            <p><span> ⌚︎ </span>Hurtig levering: 1-3 hverdage</p>
            <p><span>↩︎</span> 14 dages returret</p>
          </div>
        </div>

        <div class="sidstedel">
          <div class="hjerte">
            <p class="price produkt">799 kr.</p>
            <span class="hjertestort">♡</span>
          </div>
          <p class="lager"><span class="tjek">✓</span> På lager</p>
          <details class="vælg">
            <summary>Vælg størrelse</summary>
            <label><input class="xs" type="radio" name="valg" /> XS</label><br />
            <label><input type="radio" name="valg" /> S</label><br />
            <label><input type="radio" name="valg" /> M</label><br />
            <label><input type="radio" name="valg" /> L</label><br />
            <label><input type="radio" name="valg" /> XL</label><br />
          </details>
          <div>
            <button class="add_to_cart">Læg i kurv</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
